name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          ADMIN_PASSWORD: integration-test-admin-password
          SESSION_SECRET: integration-test-session-secret-32chars!!
          DATABASE_URL: postgresql://localhost:5432/aura_test
          DIRECT_URL: postgresql://localhost:5432/aura_test
          OPENAI_API_KEY: sk-integration-test-openai-key
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: integration-test-service-role-key
          SUPABASE_STORAGE_BUCKET: aura-uploads

      - name: Build
        run: npm run build
        env:
          ADMIN_PASSWORD: integration-test-admin-password
          SESSION_SECRET: integration-test-session-secret-32chars!!
          DATABASE_URL: postgresql://localhost:5432/aura_test
          DIRECT_URL: postgresql://localhost:5432/aura_test
          OPENAI_API_KEY: sk-integration-test-openai-key
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: integration-test-service-role-key
          SUPABASE_STORAGE_BUCKET: aura-uploads
